<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: #ffc0cb;
    text-align: center;
    overflow: hidden;
}

/* Loading Screen */
#loading {
    position: fixed;
    width: 100%;
    height: 100%;
    background: pink;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

#loading h2 {
    color: #ff1493;
}

.heart {
    font-size: 40px;
    animation: beat 1s infinite;
}

@keyframes beat {
    0% {transform: scale(1);}
    50% {transform: scale(1.2);}
    100% {transform: scale(1);}
}

/* Main Content */
#main {
    display: none;
    padding: 20px;
}

.message {
    font-size: 24px;
    margin-top: 50px;
    color: #d63384;
}

/* Button */
button {
    margin-top: 40px;
    padding: 10px 20px;
    border: none;
    background: #ff1493;
    color: white;
    border-radius: 20px;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- Loading Screen -->
<div id="loading">
    <div class="heart">❤️</div>
    <h2>Loading your birthday surprise...</h2>
</div>

<!-- Main Content -->
<div id="main">
    <h1>Happy Birthday My Love 🎂</h1>

    <div class="message" id="text">
        You are the best thing that ever happened to me 💖
    </div>

    <button onclick="nextMessage()">Next ❤️</button>
</div>

<script>

// Loading effect
setTimeout(() => {
    document.getElementById("loading").style.display = "none";
    document.getElementById("main").style.display = "block";
}, 3000);

// Messages (EDIT THESE!)
const messages = [
    "You are the best thing that ever happened to me 💖",
    "I am so lucky to have you in my life 😘",
    "You make my world brighter every day 🌎✨",
    "I love you more than words can say ❤️",
    "Happy Birthday once again, my love 🎂🎉"
];

let index = 0;

function nextMessage() {
    index++;
    if(index < messages.length){
        document.getElementById("text").innerText = messages[index];
    } else {
        document.getElementById("text").innerText = "Forever yours ❤️";
    }
}

</script>

</body>
</html>
